<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Generator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>🎓 Digital Certificate Generator</h1>
    <p>Create beautiful certificates instantly</p>
  </header>

  <main>
    <!-- Certificate Form -->
    <section class="form-section">
      <h2>Certificate Details</h2>
      <form id="certForm">
        <input type="text" id="recipientName" placeholder="Recipient Name" required/>
        <input type="text" id="courseName" placeholder="Course/Achievement Name" required/>
        <input type="date" id="certDate" required/>
        <select id="certTemplate">
          <option value="modern">Modern Template</option>
          <option value="classic">Classic Template</option>
          <option value="elegant">Elegant Template</option>
        </select>
        <input type="text" id="instructorName" placeholder="Instructor/Issuer Name" required/>
        <button type="submit">🎨 Generate Certificate</button>
      </form>
    </section>

    <!-- Certificate Preview -->
    <section id="previewSection" class="preview-section hidden">
      <h2>Certificate Preview</h2>
      <div id="certificateCanvas" class="certificate-canvas"></div>
      <div class="action-buttons">
        <button onclick="downloadCertificate()" class="download-btn">⬇️ Download as Image</button>
        <button onclick="resetForm()" class="reset-btn">🔄 Create Another</button>
      </div>
    </section>

    <!-- Recent Certificates -->
    <section class="history-section">
      <h2>Recent Certificates</h2>
      <div id="historyList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
