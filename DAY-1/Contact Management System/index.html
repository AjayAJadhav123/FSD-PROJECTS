<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Management System - Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="home">
    <header class="navbar">
      <div class="container nav-wrap">
        <h1 class="brand">Contact Management System</h1>
        <nav class="nav-links">
          <a class="nav-link active" href="index.html">Home</a>
          <a class="nav-link" href="add.html">Add Contact</a>
          <button id="themeToggle" class="btn" type="button">Dark Mode</button>
        </nav>
      </div>
    </header>

    <main class="container page-space">
      <section class="controls-card">
        <input id="searchInput" type="text" placeholder="Search by name or phone..." />

        <select id="sortSelect">
          <option value="az">Sort: A to Z</option>
          <option value="za">Sort: Z to A</option>
        </select>

        <button id="exportBtn" class="btn" type="button">Export JSON</button>
        <button id="importBtn" class="btn" type="button">Import JSON</button>
        <input id="importInput" type="file" accept="application/json" hidden />
      </section>

      <section id="contactsContainer" class="contacts-grid"></section>

      <section class="pagination">
        <button id="prevPage" class="btn" type="button">Previous</button>
        <span id="pageInfo">Page 1 of 1</span>
        <button id="nextPage" class="btn" type="button">Next</button>
      </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>
    <script src="script.js"></script>
  </body>
</html>
