<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Menu App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Restaurant Menu</h1>
        <p>Add and manage menu items easily.</p>
      </header>

      <section class="panel">
        <h2>Add Menu Item</h2>
        <form id="menu-form">
          <label for="name">Item Name</label>
          <input id="name" name="name" type="text" placeholder="e.g. Margherita Pizza" required />

          <label for="price">Price</label>
          <input id="price" name="price" type="number" min="0.01" step="0.01" placeholder="e.g. 12.99" required />

          <button type="submit">Add Item</button>
        </form>
      </section>

      <section class="panel">
        <h2>Menu Items</h2>
        <div id="menu-list" class="menu-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
